<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#0b0b0c"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>FacturaPro — Facturation Suisse</title>
<script src="https://js.stripe.com/v3/"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#c9a84c;--gl:#e8c97a;--gd:rgba(201,168,76,.12);
  --bg:#0b0b0c;--s1:#131315;--s2:#1a1a1d;
  --bd:rgba(255,255,255,.06);--bdg:rgba(201,168,76,.22);
  --tx:#ede9df;--m1:#505050;--m2:#888480
}
html{background-color:#0b0b0c}
html,body{background:#0b0b0c;color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
#app{min-height:100vh}
.hidden{display:none!important}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{width:100%;max-width:400px}
.auth-box h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--tx);margin-bottom:8px;text-align:center}
.auth-box .sub{font-size:14px;color:var(--m2);margin-bottom:40px;text-align:center}
.label-tag{font-size:9px;letter-spacing:4px;color:var(--g);text-transform:uppercase;margin-bottom:12px;text-align:center;display:block}
.inp{width:100%;padding:14px 16px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:12px;outline:none;transition:.2s}
.inp:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.inp::placeholder{color:var(--m1)}
.btn-gold{width:100%;padding:14px;background:linear-gradient(135deg,#d4a94e,#9a6e18);color:#0b0b0c;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;transition:.3s}
.btn-gold:hover{box-shadow:0 6px 28px rgba(201,168,76,.42);transform:translateY(-1px)}
.btn-ghost{width:100%;padding:10px;background:transparent;border:none;color:var(--m2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.msg{font-size:13px;color:var(--g);margin-bottom:16px;text-align:center}
.nav{background:rgba(11,11,12,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--tx);cursor:pointer}
.nav-logo span{color:var(--g)}
.nav-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-sm{padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;letter-spacing:.5px}
.btn-outline{background:transparent;border:1px solid var(--bd);color:var(--m2)}
.btn-outline:hover{border-color:rgba(255,255,255,.2);color:var(--tx)}
.btn-gold-sm{background:linear-gradient(135deg,#d4a94e,#9a6e18);border:none;color:#0b0b0c;padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.btn-gold-sm:hover{box-shadow:0 4px 20px rgba(201,168,76,.35)}
.dash{max-width:820px;margin:0 auto;padding:40px 20px}
.dash-header{margin-bottom:40px}
.dash-header .eyebrow{font-size:9px;letter-spacing:4px;color:var(--g);text-transform:uppercase;margin-bottom:4px}
.dash-header h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--tx)}
.empty{text-align:center;padding:80px 20px}
.empty .icon{font-size:40px;margin-bottom:16px;color:var(--g);font-family:'Playfair Display',serif}
.empty p{color:var(--m2);font-size:15px;margin-bottom:24px}
.inv-list{display:flex;flex-direction:column;gap:12px}
.inv-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;transition:.2s;flex-wrap:wrap;gap:14px}
.inv-card:hover{border-color:var(--bdg)}
.inv-client{color:var(--tx);font-size:15px;font-weight:600;margin-bottom:4px}
.inv-meta{color:var(--m2);font-size:13px}
.inv-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.inv-amount{font-family:'Playfair Display',serif;font-size:20px;color:var(--g)}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer}
.badge-pending{background:rgba(201,168,76,.1);color:var(--g)}
.badge-paid{background:rgba(34,197,94,.1);color:#22c55e}
.btn-edit{padding:6px 14px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--tx);font-size:12px;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
.btn-edit:hover{border-color:rgba(255,255,255,.25)}
.btn-del{padding:6px 14px;background:transparent;border:1px solid rgba(255,80,80,.2);border-radius:6px;color:#ff5050;font-size:12px;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
.btn-del:hover{background:rgba(255,80,80,.1)}
.editor{max-width:900px;margin:0 auto;padding:28px 18px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:22px 24px}
.card-title{font-size:9px;letter-spacing:3.5px;color:var(--g);text-transform:uppercase;font-weight:600;display:flex;align-items:center;gap:10px;margin-bottom:18px}
.card-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.28),transparent)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:9px;letter-spacing:2px;color:var(--m1);text-transform:uppercase;font-weight:600}
.field input,.field select,.field textarea{padding:10px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.field input::placeholder{color:var(--m1)}
.items-header{display:grid;grid-template-columns:1fr 70px 120px 110px 30px;gap:8px;margin-bottom:8px}
.items-header span{font-size:9px;letter-spacing:2px;color:var(--m1);text-transform:uppercase;font-weight:600}
.item-row{display:grid;grid-template-columns:1fr 70px 120px 110px 30px;gap:8px;margin-bottom:8px;align-items:center}
.item-total{padding:10px 11px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:8px;font-size:14px;font-weight:600;color:var(--gl);text-align:right}
.btn-remove{width:30px;height:30px;border-radius:7px;background:transparent;border:1px solid transparent;color:var(--m1);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;padding:0;font-family:'DM Sans',sans-serif}
.btn-remove:hover{background:rgba(255,70,70,.1);color:#ff6b6b;border-color:rgba(255,70,70,.2)}
.btn-add-item{margin-top:8px;padding:8px 16px;border:1px dashed rgba(201,168,76,.32);border-radius:8px;background:transparent;color:var(--g);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:.2s}
.btn-add-item:hover{background:var(--gd);border-color:var(--g)}
.totals{margin-top:18px;padding-top:16px;border-top:1px solid var(--bd);display:flex;flex-direction:column;align-items:flex-end;gap:9px}
.total-row{display:flex;align-items:center;gap:16px;font-size:14px;color:var(--m2)}
.total-row span:last-child{min-width:145px;text-align:right;color:var(--tx);font-weight:500}
.grand{background:linear-gradient(135deg,rgba(201,168,76,.13),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.26);border-radius:11px;padding:13px 18px;display:flex;align-items:center;gap:24px;margin-top:2px;width:340px;justify-content:space-between;max-width:100%}
.grand-label{font-size:10px;letter-spacing:3px;color:var(--g);text-transform:uppercase;font-weight:600}
.grand-amount{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gl)}
.actions{display:flex;gap:10px}
.btn-cancel{padding:14px 24px;background:transparent;color:var(--m2);border:1px solid rgba(255,255,255,.1);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:.2s}
.btn-cancel:hover{color:var(--tx);border-color:rgba(255,255,255,.25)}
.btn-save{flex:1;padding:14px;background:linear-gradient(135deg,#d4a94e,#9a6e18);color:#0b0b0c;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.3s}
.btn-save:hover{box-shadow:0 6px 28px rgba(201,168,76,.42);transform:translateY(-1px)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-email{flex:1;padding:14px;background:transparent;color:var(--g);border:1.5px solid var(--g);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.3s}
.btn-email:hover{background:rgba(212,169,78,.12);box-shadow:0 4px 18px rgba(201,168,76,.25);transform:translateY(-1px)}
.pricing-wrap{min-height:100vh;background:var(--bg);padding:60px 20px}
.pricing-inner{max-width:700px;margin:0 auto;text-align:center}
.pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:48px}
.plan-card{border-radius:14px;padding:32px 28px;text-align:left}
.plan-free{background:#131315;border:1px solid rgba(255,255,255,.06)}
.plan-solo{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.03));border:1px solid rgba(201,168,76,.3)}
.plan-name{font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;font-weight:600;color:var(--g)}
.plan-price{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;color:var(--tx)}
.plan-period{font-size:13px;color:var(--m2);margin-left:6px}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:10px;margin:24px 0 28px}
.plan-features li{font-size:14px;color:var(--tx);display:flex;align-items:center;gap:8px}
.plan-features li::before{content:'✓';color:var(--g);font-size:16px;font-weight:700}
.preview-wrap{max-width:790px;margin:24px auto;padding:0 18px 40px}
.preview-actions{display:flex;gap:10px;margin-bottom:20px}
.invoice-doc{background:#f8f5ef;border-radius:5px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.65)}
.inv-hdr{background:#17120c;padding:40px 48px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px}
.inv-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#f8f5ef}
.inv-lbl{font-size:9px;letter-spacing:4px;color:#c9a84c;text-transform:uppercase;margin-bottom:8px}
.inv-due{font-family:'Playfair Display',serif;font-size:16px;color:#c9a84c;font-weight:600}
.inv-body{padding:40px 48px;color:#1c1810;font-family:'DM Sans',sans-serif}
.parties{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:36px}
.party-lbl{font-size:9px;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;margin-bottom:8px}
.party-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:#1c1810;margin-bottom:4px}
.party-info{font-size:12px;color:#3a3028;line-height:1.8;white-space:pre-line}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.inv-table thead tr{border-bottom:2px solid #1c1810}
.inv-table th{padding:8px 8px 10px;font-size:9px;letter-spacing:2px;color:#5a4e48;text-transform:uppercase;font-weight:600}
.inv-table th:first-child{text-align:left}.inv-table th:not(:first-child){text-align:right}
.inv-table td{padding:12px 8px;font-size:13px;border-bottom:1px solid #ede8de;color:#3a3028}
.inv-table td:not(:first-child){text-align:right;color:#3a3028}
.inv-table td.bold{font-weight:600;color:#1c1810}
.totals-section{display:flex;justify-content:flex-end;margin-bottom:20px}
.totals-box{min-width:260px}
.total-line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #ede8de;font-size:13px;color:#3a3028}
.grand-line{display:flex;justify-content:space-between;padding:13px 0 0;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;border-top:2px solid #1c1810}
.grand-line span:last-child{color:#c9a84c}
.inv-footer{padding:16px 48px;background:#ece7de;text-align:center;font-size:9px;letter-spacing:3px;color:#5a4e48;text-transform:uppercase}
@media print{.no-print{display:none!important}body{background:white}.invoice-doc{box-shadow:none;border-radius:0}}
@media (max-width:640px){
  .g3,.g2,.parties{grid-template-columns:1fr}
  .items-header{display:none}
  .item-row{grid-template-columns:1fr;gap:6px;padding:12px;background:var(--s2);border-radius:8px}
  .pricing-grid{grid-template-columns:1fr}
  .inv-body,.inv-hdr{padding:24px}
  .inv-footer{padding:12px 24px}
  .grand{width:100%}
}
/* ---------- LANDING PAGE ---------- */
.lp-nav{background:rgba(11,11,12,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:99}
.lp-hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 20px 80px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,168,76,.08),transparent)}
.lp-hero-tag{font-size:9px;letter-spacing:5px;color:var(--g);text-transform:uppercase;margin-bottom:20px;display:block}
.lp-hero h1{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,58px);font-weight:700;color:var(--tx);line-height:1.15;max-width:800px;margin:0 auto 20px}
.lp-hero h1 span{color:var(--g)}
.lp-hero-sub{font-size:17px;color:var(--m2);margin-bottom:36px;max-width:500px;margin-left:auto;margin-right:auto;line-height:1.6}
.lp-hero-badges{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:36px}
.lp-badge{font-size:12px;padding:6px 14px;border-radius:20px;background:var(--s1);border:1px solid var(--bd);color:var(--m2)}
.lp-btn-primary{display:inline-block;padding:16px 36px;background:linear-gradient(135deg,#d4a94e,#9a6e18);color:#0b0b0c;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.3s;letter-spacing:.5px}
.lp-btn-primary:hover{box-shadow:0 8px 32px rgba(201,168,76,.45);transform:translateY(-2px)}
.lp-hero-note{font-size:12px;color:var(--m1);margin-top:14px}
.lp-strip{background:var(--s1);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:28px 32px;display:flex;justify-content:center;gap:48px;flex-wrap:wrap}
.lp-strip-item{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--m2)}
.lp-strip-item span:first-child{font-size:22px}
.lp-section{padding:80px 20px;max-width:900px;margin:0 auto}
.lp-section-tag{font-size:9px;letter-spacing:4px;color:var(--g);text-transform:uppercase;margin-bottom:12px;display:block;text-align:center}
.lp-section h2{font-family:'Playfair Display',serif;font-size:clamp(24px,3.5vw,38px);color:var(--tx);text-align:center;margin-bottom:16px}
.lp-section .lp-sub{font-size:15px;color:var(--m2);text-align:center;max-width:540px;margin:0 auto 48px;line-height:1.6}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.step-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:28px 24px;text-align:center;position:relative}
.step-num{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#d4a94e,#9a6e18);color:#0b0b0c;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.step-card h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--tx);margin-bottom:8px}
.step-card p{font-size:13px;color:var(--m2);line-height:1.6}
.benefits-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.benefit-card{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:24px;display:flex;gap:16px;align-items:flex-start}
.benefit-icon{font-size:28px;line-height:1;flex-shrink:0}
.benefit-card h3{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:6px}
.benefit-card p{font-size:13px;color:var(--m2);line-height:1.6}
.testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.testi-card{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:24px}
.testi-stars{color:var(--g);font-size:14px;margin-bottom:12px;letter-spacing:2px}
.testi-text{font-size:14px;color:var(--tx);line-height:1.7;margin-bottom:16px;font-style:italic}
.testi-author{font-size:12px;color:var(--m2)}
.testi-author strong{color:var(--g);display:block;font-style:normal}
.faq-list{display:flex;flex-direction:column;gap:12px;max-width:680px;margin:0 auto}
.faq-item{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.faq-q{padding:18px 20px;font-size:14px;font-weight:600;color:var(--tx);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.faq-q:hover{color:var(--g)}
.faq-q::after{content:'＋';color:var(--g);font-size:18px;line-height:1;flex-shrink:0}
.faq-item.open .faq-q::after{content:'－'}
.faq-a{padding:0 20px;max-height:0;overflow:hidden;font-size:14px;color:var(--m2);line-height:1.7;transition:max-height .3s ease,padding .3s ease}
.faq-item.open .faq-a{max-height:200px;padding:0 20px 18px}
.lp-cta-banner{background-color:var(--s1);background-image:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:60px 40px;text-align:center;margin:0 20px 80px;max-width:860px;margin-left:auto;margin-right:auto}
.lp-cta-banner h2{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,36px);color:var(--gl);margin-bottom:12px}
.lp-cta-banner p{font-size:15px;color:var(--m2);margin-bottom:28px}
.lp-footer{border-top:1px solid var(--bd);padding:24px 32px;text-align:center;font-size:12px;color:var(--m1);letter-spacing:1px}
.lp-footer-links{display:flex;justify-content:center;gap:20px;margin-top:12px;flex-wrap:wrap}
.lp-footer-link{background:none;border:none;color:var(--m2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:0;transition:.2s}
.lp-footer-link:hover{color:var(--g)}
.legal-overlay{position:fixed;inset:0;background:rgba(11,11,12,.88);backdrop-filter:blur(8px);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.legal-box{background:var(--s1);border:1px solid var(--bd);border-radius:18px;max-width:720px;width:100%;padding:40px;position:relative}
.legal-close{position:absolute;top:18px;right:18px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--m2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;padding:6px 14px;transition:.2s}
.legal-close:hover{color:var(--tx);border-color:rgba(255,255,255,.2)}
.legal-box h2{font-family:'Playfair Display',serif;font-size:24px;color:var(--tx);margin-bottom:28px;padding-right:60px}
.legal-box h3{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--g);font-weight:600;margin:24px 0 8px}
.legal-box h3:first-child{margin-top:0}
.legal-box p{font-size:14px;color:var(--m2);line-height:1.7;margin-bottom:4px}
/* ===== HERO SECTION ===== */
.lp-hero-section{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:110px 24px 70px;background-color:#0b0b0c;background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,168,76,.08),transparent)}

/* ============================================================
   SWISS QR-BILL (QR-IBAN, référence QRR 27 chiffres)
   ============================================================ */
function calcMod10(digits){
  const T=[0,9,4,6,8,2,7,1,3,5];
  let carry=0;
  for(let i=0;i<digits.length;i++){
    carry=T[(carry+parseInt(digits[i],10))%10];
  }
  return (10-carry)%10;
}
function buildQRR(invoiceNumber){
  const digits=String(invoiceNumber||'').replace(/\D/g,'').padStart(26,'0').slice(-26);
  return digits+calcMod10(digits);
}
function formatQRR(ref){
  const r=String(ref||'').replace(/\s/g,'');
  return r.replace(/^(\d{2})(\d{5})(\d{5})(\d{5})(\d{5})(\d{5})$/,'$1 $2 $3 $4 $5 $6');
}
function formatIBAN(iban){
  return String(iban||'').replace(/\s/g,'').toUpperCase().replace(/(.{4})/g,'$1 ').trim();
}
function isValidQRIBAN(iban){
  const i=String(iban||'').replace(/\s/g,'').toUpperCase();
  if(!/^CH\d{19}$/.test(i))return false;
  const iid=parseInt(i.substr(4,5),10);
  return iid>=30000&&iid<=31999;
}
function splitZipCity(s){
  const m=String(s||'').trim().match(/^(\d{4,5})\s+(.+)$/);
  return m?{zip:m[1],city:m[2]}:{zip:'',city:String(s||'').trim()};
}
function isProfileComplete(p){
  return p&&p.qr_iban&&p.company_name&&p.address_street&&p.address_zip&&p.address_city&&isValidQRIBAN(p.qr_iban);
}
function buildQRPayload(invoice,profile,total){
  const issIban=String(profile.qr_iban||'').replace(/\s/g,'').toUpperCase();
  const debCity=splitZipCity(invoice.client_city||'');
  const debHasStruct=!!debCity.zip&&!!debCity.city;
  const ref=buildQRR(invoice.number);
  const lines=[
    'SPC','0200','1',
    issIban,'S',
    String(profile.company_name||'').slice(0,70),
    String(profile.address_street||'').slice(0,70),
    String(profile.address_building||'').slice(0,16),
    String(profile.address_zip||'').slice(0,16),
    String(profile.address_city||'').slice(0,35),
    String(profile.address_country||'CH').slice(0,2),
    '','','','','','','',
    Number(total).toFixed(2),'CHF',
    debHasStruct?'S':'K',
    String(invoice.client_name||'').slice(0,70),
    String(invoice.client_address||'').slice(0,70),
    debHasStruct?'':String(invoice.client_city||'').slice(0,70),
    debHasStruct?debCity.zip:'',
    debHasStruct?debCity.city.slice(0,35):'',
    'CH','QRR',ref,
    ('Facture '+(invoice.number||'')).slice(0,140),
    'EPD'
  ];
  return lines.join('\r\n');
}
function buildSwissQRSvg(payload,sizePx){
  const size=sizePx||180;
  const qr=qrcode(0,'M');
  qr.addData(payload,'Byte');
  qr.make();
  const n=qr.getModuleCount();
  const m=size/n;
  let mods='';
  for(let r=0;r<n;r++){
    for(let c=0;c<n;c++){
      if(qr.isDark(r,c)){
        mods+='<rect x="'+(c*m).toFixed(2)+'" y="'+(r*m).toFixed(2)+'" width="'+m.toFixed(2)+'" height="'+m.toFixed(2)+'" fill="#000"/>';
      }
    }
  }
  const cs=size*(7/46);
  const cx=(size-cs)/2;
  const ws=cs*0.07;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'">'
    +'<rect width="'+size+'" height="'+size+'" fill="#fff"/>'
    +mods
    +'<rect x="'+(cx-ws)+'" y="'+(cx-ws)+'" width="'+(cs+2*ws)+'" height="'+(cs+2*ws)+'" fill="#fff"/>'
    +'<rect x="'+cx+'" y="'+cx+'" width="'+cs+'" height="'+cs+'" fill="#000"/>'
    +'<rect x="'+(cx+cs*0.42)+'" y="'+(cx+cs*0.18)+'" width="'+(cs*0.16)+'" height="'+(cs*0.64)+'" fill="#fff"/>'
    +'<rect x="'+(cx+cs*0.18)+'" y="'+(cx+cs*0.42)+'" width="'+(cs*0.64)+'" height="'+(cs*0.16)+'" fill="#fff"/>'
  +'</svg>';
}
function renderSwissQRBill(invoice,profile,total){
  if(!isProfileComplete(profile)){
    return '<div class="qr-bill-incomplete no-print">⚠️ Renseigne tes infos de facturation (QR-IBAN, adresse) pour générer le QR-bill suisse.<button class="btn-sm btn-outline" id="goSettingsFromBill">⚙️ Compléter mon profil</button></div>';
  }
  const payload=buildQRPayload(invoice,profile,total);
  const qrSvg=buildSwissQRSvg(payload,170);
  const ref=buildQRR(invoice.number);
  const refFmt=formatQRR(ref);
  const ibanFmt=formatIBAN(profile.qr_iban);
  const amount=Number(total).toFixed(2);
  const issuerBlock=esc(profile.company_name)+'<br>'+esc(profile.address_street)+(profile.address_building?' '+esc(profile.address_building):'')+'<br>'+esc(profile.address_zip)+' '+esc(profile.address_city);
  const debtorBlock=esc(invoice.client_name||'')+'<br>'+esc(invoice.client_address||'')+'<br>'+esc(invoice.client_city||'');
  return ''
    +'<div class="qr-bill" id="qrBill">'
    +'<div class="qr-receipt">'
      +'<div class="qr-r-title">Récépissé</div>'
      +'<div class="qr-r-section"><div class="qr-r-label">Compte / Payable à</div><div class="qr-r-value">'+esc(ibanFmt)+'<br>'+issuerBlock+'</div></div>'
      +'<div class="qr-r-section"><div class="qr-r-label">Référence</div><div class="qr-r-value">'+esc(refFmt)+'</div></div>'
      +'<div class="qr-r-section"><div class="qr-r-label">Payable par</div><div class="qr-r-value">'+debtorBlock+'</div></div>'
      +'<div class="qr-r-amount-row">'
        +'<div><div class="qr-r-label">Monnaie</div><div class="qr-r-value">CHF</div></div>'
        +'<div><div class="qr-r-label">Montant</div><div class="qr-r-value">'+esc(amount)+'</div></div>'
      +'</div>'
      +'<div class="qr-r-accept">Point de dépôt</div>'
    +'</div>'
    +'<div class="qr-payment">'
      +'<div class="qr-p-left">'
        +'<div class="qr-p-title">Section paiement</div>'
        +'<div class="qr-p-qr">'+qrSvg+'</div>'
        +'<div class="qr-p-amount-row">'
          +'<div><div class="qr-p-label">Monnaie</div><div class="qr-p-value">CHF</div></div>'
          +'<div><div class="qr-p-label">Montant</div><div class="qr-p-value">'+esc(amount)+'</div></div>'
        +'</div>'
      +'</div>'
      +'<div class="qr-p-right">'
        +'<div class="qr-p-section"><div class="qr-p-label">Compte / Payable à</div><div class="qr-p-value">'+esc(ibanFmt)+'<br>'+issuerBlock+'</div></div>'
        +'<div class="qr-p-section"><div class="qr-p-label">Référence</div><div class="qr-p-value">'+esc(refFmt)+'</div></div>'
        +'<div class="qr-p-section"><div class="qr-p-label">Informations supplémentaires</div><div class="qr-p-value">Facture '+esc(invoice.number||'')+'</div></div>'
        +'<div class="qr-p-section"><div class="qr-p-label">Payable par</div><div class="qr-p-value">'+debtorBlock+'</div></div>'
      +'</div>'
    +'</div>'
  +'</div>';
}

  if(f.client_address){doc.text(f.client_address,M+4,cy);cy+=5;}
  if(f.client_city){doc.text(f.client_city,M+4,cy);cy+=5;}
  if(f.client_vat){doc.text('N° TVA : '+f.client_vat,M+4,cy);}
  y+=38;
  doc.setFillColor(11,11,12);
  doc.rect(M,y,W-2*M,8,'F');
  doc.setFontSize(8);
  doc.setFont('helvetica','bold');
  doc.setTextColor(212,169,78);
  doc.text('DESCRIPTION',M+3,y+5.5);
  doc.text('QTÉ',132,y+5.5,{align:'right'});
  doc.text('P.U.',157,y+5.5,{align:'right'});
  doc.text('TOTAL CHF',W-M-3,y+5.5,{align:'right'});
  y+=8;
  (f.items||[]).forEach((item,i)=>{
    const rh=8;
    if(i%2===1){doc.setFillColor(250,250,250);doc.rect(M,y,W-2*M,rh,'F');}
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(11,11,12);
    const desc=(item.desc||'').substring(0,52);
    doc.text(desc,M+3,y+5.5);
    doc.text(String(Number(item.qty||0)),132,y+5.5,{align:'right'});
    doc.text(Number(item.price||0).toFixed(2),157,y+5.5,{align:'right'});
    doc.text((Number(item.qty||0)*Number(item.price||0)).toFixed(2),W-M-3,y+5.5,{align:'right'});
    y+=rh;
  });
  y+=6;
  const tx=120,vx=W-M-3;
  doc.setDrawColor(220,220,220);
  doc.setLineWidth(0.3);
  doc.line(tx,y,W-M,y);
  y+=5;
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(90,90,90);
  doc.text('Sous-total HT',tx,y);
  doc.text(sub.toFixed(2)+' CHF',vx,y,{align:'right'});
  y+=6;
  doc.text('TVA ('+f.vat_rate+'%)',tx,y);
  doc.text(vt.toFixed(2)+' CHF',vx,y,{align:'right'});
  y+=4;
  doc.setDrawColor(212,169,78);
  doc.setLineWidth(0.5);
  doc.line(tx,y,W-M,y);
  y+=2;
  doc.setFillColor(212,169,78);
  doc.rect(tx,y,W-M-tx,9,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(11,11,12);
  doc.text('TOTAL TTC',tx+3,y+6);
  doc.text(tot.toFixed(2)+' CHF',vx,y+6,{align:'right'});
  y+=16;
  if(f.notes&&f.notes.trim()){
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor(11,11,12);
    doc.text('Notes :',M,y);
    y+=5;
    doc.setFont('helvetica','normal');
    doc.setTextColor(70,70,70);
    const lines=doc.splitTextToSize(f.notes,W-2*M);
    doc.text(lines,M,y);
    y+=lines.length*5;
  }
  doc.setFillColor(245,245,245);
  doc.rect(0,278,W,19,'F');
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(160,160,160);
  doc.text('Généré avec FacturaPro · facturapro.ch',W/2,287,{align:'center'});
  return doc.output('blob');
}

async function saveProfileSettings(){
  const get=id=>{const el=document.getElementById(id);return el?(el.value||'').trim():'';};
  const iban=get('p_qr_iban').replace(/\s/g,'').toUpperCase();
  if(!isValidQRIBAN(iban)){
    state.msg='⚠️ QR-IBAN invalide. Format CHxx 3xxx xxxx xxxx xxxx x (21 caractères, IID entre 30000 et 31999)';
    render();return;
  }
  if(!get('p_company_name')||!get('p_address_street')||!get('p_address_zip')||!get('p_address_city')){
    state.msg='⚠️ Remplis tous les champs marqués d\'une étoile';
    render();return;
  }
  const payload={
    id:state.session.user.id,
    company_name:get('p_company_name'),
    qr_iban:iban,
    address_street:get('p_address_street'),
    address_building:get('p_address_building'),
    address_zip:get('p_address_zip'),
    address_city:get('p_address_city'),
    address_country:get('p_address_country')||'CH'
  };
  state.msg='Enregistrement...';render();
  try{
    const{error}=await sb.from('profiles').upsert(payload,{onConflict:'id'});
    if(error)throw error;
    await loadPlan();
    state.msg='✓ Infos enregistrées';
    setTimeout(()=>{state.page='dashboard';state.msg='';render();},900);
    render();
  }catch(e){
    state.msg='Erreur: '+(e.message||e);render();
  }
}

/* ---------- BIND EVENTS ---------- */
function bindEvents(){
  document.querySelectorAll('[data-lang]').forEach(btn=>{btn.onclick=()=>{state.lang=btn.getAttribute('data-lang');render();};});
  // LANDING
  const lpLogo=document.getElementById('lpLogo');
  if(lpLogo) lpLogo.onclick=()=>{state.page='landing';render();};
  const lpLogin=document.getElementById('lpLogin');
  if(lpLogin) lpLogin.onclick=()=>{state.authMode='login';state.msg='';state.page='auth';render();};
  const lpSignupBtn=document.getElementById('lpSignup');
  if(lpSignupBtn) lpSignupBtn.onclick=()=>{state.authMode='signup';state.msg='';state.page='auth';render();};
  const lpHeroCta=document.getElementById('lpHeroCta');
  if(lpHeroCta) lpHeroCta.onclick=()=>{state.authMode='signup';state.msg='';state.page='auth';render();};
  const lpFreeStart=document.getElementById('lpFreeStart');
  if(lpFreeStart) lpFreeStart.onclick=()=>{state.authMode='signup';state.msg='';state.page='auth';render();};
  const lpSoloStart=document.getElementById('lpSoloStart');
  if(lpSoloStart) lpSoloStart.onclick=()=>{state.authMode='signup';state.msg='';state.page='auth';render();};
  const lpSoloAnnual=document.getElementById('lpSoloAnnual');
  if(lpSoloAnnual) lpSoloAnnual.onclick=()=>{window.open(STRIPE_LINK_ANNUAL||STRIPE_LINK,'_blank','noopener,noreferrer');};
  const lpBottomCta=document.getElementById('lpBottomCta');
  if(lpBottomCta) lpBottomCta.onclick=()=>{state.authMode='signup';state.msg='';state.page='auth';render();};
  const backToLanding=document.getElementById('backToLanding');
  if(backToLanding) backToLanding.onclick=()=>{state.page='landing';render();};
  const logo=document.getElementById('goHome');
  if(logo) logo.onclick=()=>{state.page='dashboard';render();};
  // AUTH
  const authBtn=document.getElementById('authBtn');
  if(authBtn){
    authBtn.onclick=async()=>{
      const email=document.getElementById('email').value.trim();
      const password=document.getElementById('password').value;
      if(!email||!password){state.msg='Email et mot de passe requis';render();return;}
      state.msg='Chargement...';render();
      try{
        if(state.authMode==='login'){
          const{data,error}=await sb.auth.signInWithPassword({email,password});
          if(error)throw error;
          state.session=data.session;state.msg='';
          await Promise.all([loadInvoices(),loadPlan()]);
          state.page='dashboard';render();
        }else{
          const{data,error}=await sb.auth.signUp({email,password});
          if(error)throw error;
          if(data.session){
            state.session=data.session;state.msg='';
            await Promise.all([loadInvoices(),loadPlan()]);
            state.page='dashboard';render();
          }else{
            state.msg='Compte créé ! Vérifie ton email pour confirmer.';
            state.authMode='login';render();
          }
        }
      }catch(e){state.msg=e.message||'Erreur';render();}
    };
  }
  const toggleAuth=document.getElementById('toggleAuth');
  if(toggleAuth) toggleAuth.onclick=()=>{state.authMode=state.authMode==='login'?'signup':'login';state.msg='';render();};
  const googleSignIn=document.getElementById('googleSignIn');
  if(googleSignIn){
    googleSignIn.onclick=async()=>{
      state.msg='Redirection vers Google...';render();
      try{
        const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+window.location.pathname}});
        if(error)throw error;
      }catch(e){state.msg=e.message||'Erreur Google';render();}
    };
  }
  // FORGOT
  const gotoForgot=document.getElementById('gotoForgot');
  if(gotoForgot) gotoForgot.onclick=()=>{state.page='forgot';state.msg='';render();};
  const backToLogin=document.getElementById('backToLogin');
  if(backToLogin) backToLogin.onclick=()=>{state.page='auth';state.authMode='login';state.msg='';render();};
  const sendResetBtn=document.getElementById('sendResetBtn');
  if(sendResetBtn){
    sendResetBtn.onclick=async()=>{
      const email=document.getElementById('forgotEmail').value.trim();
      if(!email){state.msg='Email requis';render();return;}
      state.msg='Envoi en cours...';render();
      try{
        const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+window.location.pathname});
        if(error)throw error;
        state.msg='✓ Email envoyé ! Vérifie ta boîte de réception.';render();
      }catch(e){state.msg=e.message||'Erreur lors de l\'envoi';render();}
    };
  }
  // RESET
  const updatePasswordBtn=document.getElementById('updatePasswordBtn');
  if(updatePasswordBtn){
    updatePasswordBtn.onclick=async()=>{
      const p1=document.getElementById('newPassword').value;
      const p2=document.getElementById('newPasswordConfirm').value;
      if(!p1||p1.length<6){state.msg='Mot de passe min. 6 caractères';render();return;}
      if(p1!==p2){state.msg='Les mots de passe ne correspondent pas';render();return;}
      state.msg='Mise à jour...';render();
      try{
        const{error}=await sb.auth.updateUser({password:p1});
        if(error)throw error;
        state.msg='✓ Mot de passe mis à jour !';
        await loadInvoices();
        setTimeout(()=>{state.page='dashboard';state.msg='';render();},1200);
        render();
      }catch(e){state.msg=e.message||'Erreur';render();}
    };
  }
  // DASHBOARD
  const logout=document.getElementById('logout');
  if(logout) logout.onclick=async()=>{await sb.auth.signOut();state.session=null;state.invoices=[];state.profile=null;state.page='auth';render();};
  const newInv=document.getElementById('newInv');
  if(newInv) newInv.onclick=()=>{
    if(!canCreateInvoice()){state.showLimitModal=true;render();return;}
    state.form=newInvoice();state.currentInvoice=null;state.editorTab='edit';state.saving=false;state.page='editor';render();
  };
  const newInv2=document.getElementById('newInv2');
  if(newInv2) newInv2.onclick=()=>{
    if(!canCreateInvoice()){state.showLimitModal=true;render();return;}
    state.form=newInvoice();state.currentInvoice=null;state.editorTab='edit';state.saving=false;state.page='editor';render();
  };
  const gopricing=document.getElementById('gopricing');
  if(gopricing) gopricing.onclick=()=>{state.page='pricing';render();};
  // SETTINGS
  const goSettings=document.getElementById('goSettings');
  if(goSettings) goSettings.onclick=()=>{state.msg='';state.page='settings';render();};
  const goSettingsFromBill=document.getElementById('goSettingsFromBill');
  if(goSettingsFromBill) goSettingsFromBill.onclick=()=>{state.msg='';state.page='settings';render();};
  const settingsBack=document.getElementById('settingsBack');
  if(settingsBack) settingsBack.onclick=()=>{state.msg='';state.page='dashboard';render();};
  const settingsCancel=document.getElementById('settingsCancel');
  if(settingsCancel) settingsCancel.onclick=()=>{state.msg='';state.page='dashboard';render();};
  const settingsSave=document.getElementById('settingsSave');
  if(settingsSave) settingsSave.onclick=saveProfileSettings;
  // CONTACT
  const goContact=document.getElementById('goContact');
  if(goContact) goContact.onclick=()=>{state.msg='';state.page='contact';render();};
  const contactBack=document.getElementById('contactBack');
  if(contactBack) contactBack.onclick=()=>{state.msg='';state.page=state.session?'dashboard':'landing';render();};
  const contactSendBtn=document.getElementById('contactSendBtn');
  if(contactSendBtn){
    contactSendBtn.onclick=async()=>{
      const email=(document.getElementById('contactEmail').value||'').trim();
      const subject=(document.getElementById('contactSubject').value||'').trim();
      const message=(document.getElementById('contactMessage').value||'').trim();
      if(!email||!email.includes('@')){state.msg='⚠️ Email valide requis';render();return;}
      if(!subject){state.msg='⚠️ Objet requis';render();return;}
      if(!message){state.msg='⚠️ Message requis';render();return;}
      if(FORMSPREE_ID&&FORMSPREE_ID.trim()){
        state.msg='Envoi en cours...';render();
        try{
          const res=await fetch('https://formspree.io/f/'+FORMSPREE_ID,{
            method:'POST',
            headers:{'Content-Type':'application/json','Accept':'application/json'},
            body:JSON.stringify({email:email,_replyto:email,_subject:'[FacturaPro Contact] '+subject,subject:subject,message:message})
          });
          if(!res.ok)throw new Error('Erreur réseau');
          state.msg='✓ Message envoyé ! On te répond rapidement.';
          const s=document.getElementById('contactSubject');
          const m=document.getElementById('contactMessage');
          if(s)s.value='';
          if(m)m.value='';
          render();
        }catch(e){state.msg='❌ Erreur d\'envoi. Réessaie ou écris directement à '+CONTACT_EMAIL;render();}
        return;
      }
      const mailSubject=encodeURIComponent('[FacturaPro] '+subject);
      const mailBody=encodeURIComponent(message+'\n\n---\nDe : '+email+'\nEnvoyé depuis facturapro.ch');
      window.location.href='mailto:'+CONTACT_EMAIL+'?subject='+mailSubject+'&body='+mailBody;
      state.msg='📧 Ton app Mail s\'ouvre. Vérifie l\'envoi puis envoie le mail.';render();
    };
  }
  // LIMIT MODAL
  const closeLimitModal=document.getElementById('closeLimitModal');
  if(closeLimitModal) closeLimitModal.onclick=()=>{state.showLimitModal=false;render();};
  const limitModalBg=document.getElementById('limitModalBg');
  if(limitModalBg) limitModalBg.onclick=(e)=>{if(e.target&&e.target.id==='limitModalBg'){state.showLimitModal=false;render();}};
  const upgradeFromModal=document.getElementById('upgradeFromModal');
  if(upgradeFromModal) upgradeFromModal.onclick=()=>{window.open(STRIPE_LINK,'_blank','noopener,noreferrer');state.showLimitModal=false;render();};
  const upgradeFromDash=document.getElementById('upgradeFromDash');
  if(upgradeFromDash) upgradeFromDash.onclick=()=>{window.open(STRIPE_LINK,'_blank','noopener,noreferrer');};
  // EDIT/DELETE invoices
  document.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.onclick=()=>{
      if(state.plan!=='solo'){state.showLimitModal=true;render();return;}
      const id=btn.getAttribute('data-edit');
      const inv=state.invoices.find(i=>String(i.id)===String(id));
      if(inv){
        state.currentInvoice=inv;
        state.form=JSON.parse(JSON.stringify({
          number:inv.number,date:inv.date,due_date:inv.due_date,
          client_name:inv.client_name||'',client_address:inv.client_address||'',
          client_city:inv.client_city||'',client_vat:inv.client_vat||'',
          vat_rate:Number(inv.vat_rate||8.1),notes:inv.notes||'',
          items:Array.isArray(inv.items)?inv.items:[{desc:'',qty:1,price:0}],
          status:inv.status||'pending'
        }));
        state.editorTab='edit';state.page='editor';render();
      }
    };
  });
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick=async()=>{
      if(state.plan!=='solo'){state.showLimitModal=true;render();return;}
      if(!confirm('Supprimer cette facture ?'))return;
      const id=btn.getAttribute('data-del');
      await sb.from('invoices').delete().eq('id',id);
      await loadInvoices();render();
    };
  });
  document.querySelectorAll('[data-toggle-status]').forEach(el=>{
    el.onclick=async()=>{
      const id=el.getAttribute('data-toggle-status');
      const inv=state.invoices.find(i=>String(i.id)===String(id));
      if(!inv)return;
      const next=inv.status==='paid'?'pending':'paid';
      await sb.from('invoices').update({status:next}).eq('id',id);
      await loadInvoices();render();
    };
  });
  // EDITOR
  const backDash=document.getElementById('backDash');
  if(backDash) backDash.onclick=()=>{state.saving=false;state.page='dashboard';render();};
  const backDash2=document.getElementById('backDash2');
  if(backDash2) backDash2.onclick=()=>{state.saving=false;state.page='dashboard';render();};
  const tabEdit=document.getElementById('tabEdit');
  if(tabEdit) tabEdit.onclick=()=>{state.editorTab='edit';render();};
  const tabPreview=document.getElementById('tabPreview');
  if(tabPreview) tabPreview.onclick=()=>{syncFormFromDOM();state.editorTab='preview';render();};
  const printInv=document.getElementById('printInv');
  if(printInv) printInv.onclick=()=>window.print();
  const addItem=document.getElementById('addItem');
  if(addItem) addItem.onclick=()=>{syncFormFromDOM();state.form.items.push({desc:'',qty:1,price:0});render();};
  document.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.onclick=()=>{
      const i=Number(btn.getAttribute('data-remove'));
      syncFormFromDOM();
      if(state.form.items.length>1)state.form.items.splice(i,1);
      render();
    };
  });
  function updateTotalsInPlace(){
    const f=state.form;
    const rows=document.querySelectorAll('.item-row');
    rows.forEach((row,i)=>{
      if(!f.items[i])return;
      const totalEl=row.querySelector('.item-total');
      if(totalEl){
        const q=Number(f.items[i].qty||0);
        const p=Number(f.items[i].price||0);
        totalEl.textContent=(q*p).toFixed(2);
      }
    });
    const{sub,vt,tot}=calcTotals(f);
    const totalRows=document.querySelectorAll('.totals .total-row');
    if(totalRows[0]){const subEl=totalRows[0].querySelector('span:last-child');if(subEl)subEl.textContent=sub.toFixed(2)+' CHF';}
    if(totalRows[1]){const vatEl=totalRows[1].querySelector('span:last-child');if(vatEl)vatEl.textContent=vt.toFixed(2)+' CHF';}
    const grandEl=document.querySelector('.grand-amount');
    if(grandEl)grandEl.textContent=tot.toFixed(2)+' CHF';
  }
  document.querySelectorAll('[data-item]').forEach(inp=>{
    inp.oninput=()=>{syncFormFromDOM();updateTotalsInPlace();};
  });
  const vatSel=document.getElementById('f_vat_rate');
  if(vatSel) vatSel.onchange=()=>{syncFormFromDOM();updateTotalsInPlace();};
  const cancelEdit=document.getElementById('cancelEdit');
  if(cancelEdit) cancelEdit.onclick=()=>{state.saving=false;state.page='dashboard';render();};
  const saveInv=document.getElementById('saveInv');
  if(saveInv) saveInv.onclick=saveInvoice;
  const sendEmailInv=document.getElementById('sendEmailInv');
  if(sendEmailInv) sendEmailInv.onclick=saveAndSendInvoiceByEmail;
  // PRICING
  const upgradeStripe=document.getElementById('upgradeStripe');
  if(upgradeStripe) upgradeStripe.onclick=()=>{window.open(STRIPE_LINK,'_blank','noopener,noreferrer');};
  const upgradeStripeAnnual=document.getElementById('upgradeStripeAnnual');
  if(upgradeStripeAnnual) upgradeStripeAnnual.onclick=()=>{window.open(STRIPE_LINK_ANNUAL||STRIPE_LINK,'_blank','noopener,noreferrer');};
}

/* ---------- FORM SYNC ---------- */
function syncFormFromDOM(){
  if(!state.form)return;
  const g=id=>{const el=document.getElementById(id);return el?el.value:undefined;};
  const f=state.form;
  if(g('f_number')!==undefined)f.number=g('f_number');
  if(g('f_date')!==undefined)f.date=g('f_date');
  if(g('f_due_date')!==undefined)f.due_date=g('f_due_date');
  if(g('f_client_name')!==undefined)f.client_name=g('f_client_name');
  if(g('f_client_address')!==undefined)f.client_address=g('f_client_address');
  if(g('f_client_city')!==undefined)f.client_city=g('f_client_city');
  if(g('f_client_vat')!==undefined)f.client_vat=g('f_client_vat');
  if(g('f_vat_rate')!==undefined)f.vat_rate=Number(g('f_vat_rate'));
  if(g('f_notes')!==undefined)f.notes=g('f_notes');
  document.querySelectorAll('[data-item]').forEach(inp=>{
    const i=Number(inp.getAttribute('data-item'));
    const field=inp.getAttribute('data-field');
    if(!f.items[i])f.items[i]={desc:'',qty:1,price:0};
    f.items[i][field]=field==='desc'?inp.value:Number(inp.value||0);
  });
}

/* ---------- DATA ---------- */
async function loadInvoices(){
  if(!state.session)return;
  const{data,error}=await sb.from('invoices').select('*').order('created_at',{ascending:false});
  if(error){console.error(error);return;}
  state.invoices=data||[];
}
// Charge plan + infos de facturation (QR-IBAN, adresse)
async function loadPlan(){
  if(!state.session){state.profile=null;state.plan='free';return;}
  const{data,error}=await sb.from('profiles').select('*').eq('id',state.session.user.id).maybeSingle();
  if(error){console.error('loadPlan error',error);state.profile=null;state.plan='free';return;}
  state.profile=data||{};
  state.plan=(data&&data.plan)||'free';
}
function countInvoicesThisMonth(){
  const now=new Date();
  const y=now.getFullYear();
  const m=now.getMonth();
  return state.invoices.filter(inv=>{
    const d=inv.created_at?new Date(inv.created_at):(inv.date?new Date(inv.date+'T12:00:00'):null);
    if(!d)return false;
    return d.getFullYear()===y&&d.getMonth()===m;
  }).length;
}
function canCreateInvoice(){
  if(state.plan==='solo')return true;
  return countInvoicesThisMonth()<FREE_MONTHLY_LIMIT;
}
async function saveInvoice(){
  if(state.saving)return;
  syncFormFromDOM();
  const f=state.form;
  if(!f.client_name||!f.client_name.trim()){alert('Le nom du client est requis');return;}
  const isNew=!state.currentInvoice||!state.currentInvoice.id;
  if(isNew&&!canCreateInvoice()){state.showLimitModal=true;state.page='dashboard';render();return;}
  const{sub,vt,tot}=calcTotals(f);
  state.saving=true;render();
  const payload={
    user_id:state.session.user.id,
    number:f.number,date:f.date,due_date:f.due_date,
    client_name:f.client_name,client_address:f.client_address,
    client_city:f.client_city,client_vat:f.client_vat,
    vat_rate:Number(f.vat_rate),notes:f.notes,items:f.items,
    status:f.status||'pending',
    subtotal:Number(sub.toFixed(2)),vat_amount:Number(vt.toFixed(2)),total:Number(tot.toFixed(2))
  };
  try{
    if(state.currentInvoice&&state.currentInvoice.id){
      const{error}=await sb.from('invoices').update(payload).eq('id',state.currentInvoice.id);
      if(error)throw error;
    }else{
      const{error}=await sb.from('invoices').insert(payload);
      if(error)throw error;
    }
    await loadInvoices();
    state.saving=false;
    state.page='dashboard';render();
  }catch(e){
    console.error(e);state.saving=false;
    alert('Erreur lors de l\'enregistrement : '+(e.message||e));render();
  }
}
async function saveAndSendInvoiceByEmail(){
  syncFormFromDOM();
  const f=state.form;
  if(!f.client_name||!f.client_name.trim()){alert('Le nom du client est requis');return;}
  const isNew=!state.currentInvoice||!state.currentInvoice.id;
  if(isNew&&!canCreateInvoice()){state.showLimitModal=true;state.page='dashboard';render();return;}
  const{sub,vt,tot}=calcTotals(f);
  state.saving=true;render();
  const payload={
    user_id:state.session.user.id,
    number:f.number,date:f.date,due_date:f.due_date,
    client_name:f.client_name,client_address:f.client_address,
    client_city:f.client_city,client_vat:f.client_vat,
    vat_rate:Number(f.vat_rate),notes:f.notes,items:f.items,
    status:f.status||'pending',
    subtotal:Number(sub.toFixed(2)),vat_amount:Number(vt.toFixed(2)),total:Number(tot.toFixed(2))
  };
  try{
    if(state.currentInvoice&&state.currentInvoice.id){
      const{error}=await sb.from('invoices').update(payload).eq('id',state.currentInvoice.id);
      if(error)throw error;
    }else{
      const{error}=await sb.from('invoices').insert(payload);
      if(error)throw error;
    }
    await loadInvoices();
    state.saving=false;render();
  }catch(e){
    console.error(e);state.saving=false;
    alert('Erreur lors de l\'enregistrement : '+(e.message||e));render();return;
  }
  const pdfBlob=generateInvoicePDF(f,sub,vt,tot);
  const fname='Facture-'+(f.number||'').replace(/[\/\\]/g,'-')+'.pdf';
  const pdfFile=new File([pdfBlob],fname,{type:'application/pdf'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[pdfFile]})){
    try{
      await navigator.share({files:[pdfFile],title:'Facture '+(f.number||'')+' — '+(f.client_name||''),text:'Veuillez trouver ci-joint votre facture n° '+(f.number||'')+' — Total TTC : CHF '+tot.toFixed(2)});
      return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  const blobUrl=URL.createObjectURL(pdfBlob);
  const a=document.createElement('a');
  a.href=blobUrl;a.download=fname;document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(blobUrl);},1000);
  const email=prompt('📧 Email du client (le PDF vient d\'être téléchargé — joignez-le à votre email) :','');
  if(!email||!email.trim())return;
  const subject=encodeURIComponent('Facture '+(f.number||'')+' – '+(f.client_name||''));
  const body=encodeURIComponent('Bonjour,\n\nVeuillez trouver en pièce jointe votre facture n° '+(f.number||'')+'.\n\nTotal TTC : CHF '+tot.toFixed(2)+'\nÉchéance : '+(f.due_date||'')+'\n\nCordialement');
  window.open('mailto:'+email.trim()+'?subject='+subject+'&body='+body,'_blank');
}

/* ---------- INIT ---------- */
(async function init(){
  render();
  try{
    const hash=window.location.hash||'';
    const isRecovery=hash.includes('type=recovery');
    const{data}=await sb.auth.getSession();
    if(isRecovery){
      state.session=data&&data.session?data.session:null;
      state.page='reset';
    }else if(data&&data.session){
      state.session=data.session;
      await Promise.all([loadInvoices(),loadPlan()]);
      state.page='dashboard';
    }else{
      state.page='landing';
    }
  }catch(e){state.page='landing';}
  render();
  sb.auth.onAuthStateChange(async(event,session)=>{
    state.session=session;
    if(event==='PASSWORD_RECOVERY'){state.page='reset';render();return;}
    if(event==='SIGNED_IN'&&session){
      await Promise.all([loadInvoices(),loadPlan()]);
      if(state.page==='auth'||state.page==='loading'||state.page==='forgot'||state.page==='landing'){
        state.page='dashboard';state.msg='';
      }
      render();return;
    }
    if(!session){state.page='landing';state.invoices=[];state.profile=null;render();}
  });
})();
