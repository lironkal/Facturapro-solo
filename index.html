<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FacturaPro — Facturation Suisse</title>
<script src="https://js.stripe.com/v3/"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#c9a84c;--gl:#e8c97a;--gd:rgba(201,168,76,.12);
  --bg:#0b0b0c;--s1:#131315;--s2:#1a1a1d;
  --bd:rgba(255,255,255,.06);--bdg:rgba(201,168,76,.22);
  --tx:#ede9df;--m1:#505050;--m2:#888480
}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
#app{min-height:100vh}
.hidden{display:none!important}
/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{width:100%;max-width:400px}
.auth-box h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--tx);margin-bottom:8px;text-align:center}
.auth-box .sub{font-size:14px;color:var(--m2);margin-bottom:40px;text-align:center}
.label-tag{font-size:9px;letter-spacing:4px;color:var(--g);text-transform:uppercase;margin-bottom:12px;text-align:center;display:block}
.inp{width:100%;padding:14px 16px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:12px;outline:none;transition:.2s}
.inp:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.inp::placeholder{color:var(--m1)}
.btn-gold{width:100%;padding:14px;background:linear-gradient(135deg,#d4a94e,#9a6e18);color:#0b0b0c;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;transition:.3s}
.btn-gold:hover{box-shadow:0 6px 28px rgba(201,168,76,.42);transform:translateY(-1px)}
.btn-ghost{width:100%;padding:10px;background:transparent;border:none;color:var(--m2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.msg{font-size:13px;color:var(--g);margin-bottom:16px;text-align:center}
/* Dashboard */
.nav{background:rgba(11,11,12,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--tx)}
.nav-logo span{color:var(--g)}
.nav-actions{display:flex;gap:10px}
.btn-sm{padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;letter-spacing:.5px}
.btn-outline{background:transparent;border:1px solid var(--bd);color:var(--m2)}
.btn-outline:hover{border-color:rgba(255,255,255,.2);color:var(--tx)}
.btn-gold-sm{background:linear-gradient(135deg,#d4a94e,#9a6e18);border:none;color:#0b0b0c;padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.dash{max-width:820px;margin:0 auto;padding:40px 20px}
.dash-header{margin-bottom:40px}
.dash-header .eyebrow{font-size:9px;letter-spacing:4px;color:var(--g);text-transform:uppercase;margin-bottom:4px}
.dash-header h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--tx)}
.empty{text-align:center;padding:80px 20px}
.empty .icon{font-size:40px;margin-bottom:16px}
.empty p{color:var(--m2);font-size:15px;margin-bottom:24px}
.inv-list{display:flex;flex-direction:column;gap:12px}
.inv-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;transition:.2s}
.inv-card:hover{border-color:var(--bdg)}
.inv-client{color:var(--tx);font-size:15px;font-weight:600;margin-bottom:4px}
.inv-meta{color:var(--m2);font-size:13px}
.inv-right{display:flex;align-items:center;gap:14px}
.inv-amount{font-family:'Playfair Display',serif;font-size:20px;color:var(--g)}
.badge{font-size:11px;padding:4px 10px;border-radius:20px}
.badge-pending{background:rgba(201,168,76,.1);color:var(--g)}
.badge-paid{background:rgba(34,197,94,.1);color:#22c55e}
.btn-edit{padding:6px 14px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--tx);font-size:12px;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
.btn-edit:hover{border-color:rgba(255,255,255,.25)}
.btn-del{padding:6px 14px;background:transparent;border:1px solid rgba(255,80,80,.2);border-radius:6px;color:#ff5050;font-size:12px;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
/* Editor */
.editor{max-width:900px;margin:0 auto;padding:28px 18px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:22px 24px}
.card-title{font-size:9px;letter-spacing:3.5px;color:var(--g);text-transform:uppercase;font-weight:600;display:flex;align-items:center;gap:10px;margin-bottom:18px}
.card-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.28),transparent)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:9px;letter-spacing:2px;color:var(--m1);text-transform:uppercase;font-weight:600}
.field input,.field select,.field textarea{padding:10px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.field input::placeholder{color:var(--m1)}
.items-header{display:grid;grid-template-columns:1fr 70px 120px 110px 30px;gap:8px;margin-bottom:8px}
.items-header span{font-size:9px;letter-spacing:2px;color:var(--m1);text-transform:uppercase;font-weight:600}
.item-row{display:grid;grid-template-columns:1fr 70px 120px 110px 30px;gap:8px;margin-bottom:8px;align-items:center}
.item-total{padding:10px 11px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:8px;font-size:14px;font-weight:600;color:var(--gl);text-align:right}
.btn-remove{width:30px;height:30px;border-radius:7px;background:transparent;border:1px solid transparent;color:var(--m1);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;padding:0;font-family:'DM Sans',sans-serif}
.btn-remove:hover{background:rgba(255,70,70,.1);color:#ff6b6b;border-color:rgba(255,70,70,.2)}
.btn-add-item{margin-top:8px;padding:8px 16px;border:1px dashed rgba(201,168,76,.32);border-radius:8px;background:transparent;color:var(--g);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:.2s}
.btn-add-item:hover{background:var(--gd);border-color:var(--g)}
.totals{margin-top:18px;padding-top:16px;border-top:1px solid var(--bd);display:flex;flex-direction:column;align-items:flex-end;gap:9px}
.total-row{display:flex;align-items:center;gap:16px;font-size:14px;color:var(--m2)}
.total-row span:last-child{min-width:145px;text-align:right;color:var(--tx);font-weight:500}
.grand{background:linear-gradient(135deg,rgba(201,168,76,.13),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.26);border-radius:11px;padding:13px 18px;display:flex;align-items:center;gap:24px;margin-top:2px;width:340px;justify-content:space-between}
.grand-label{font-size:10px;letter-spacing:3px;color:var(--g);text-transform:uppercase;font-weight:600}
.grand-amount{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gl)}
.actions{display:flex;gap:10px}
.btn-cancel{padding:14px 24px;background:transparent;color:var(--m2);border:1px solid rgba(255,255,255,.1);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:.2s}
.btn-cancel:hover{color:var(--tx);border-color:rgba(255,255,255,.25)}
.btn-save{flex:1;padding:14px;background:linear-gradient(135deg,#d4a94e,#9a6e18);color:#0b0b0c;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.3s}
.btn-save:hover{box-shadow:0 6px 28px rgba(201,168,76,.42);transform:translateY(-1px)}
/* Pricing */
.pricing-wrap{min-height:100vh;background:var(--bg);padding:60px 20px}
.pricing-inner{max-width:700px;margin:0 auto;text-align:center}
.pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:48px}
.plan-card{border-radius:14px;padding:32px 28px;text-align:left}
.plan-free{background:#131315;border:1px solid rgba(255,255,255,.06)}
.plan-solo{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.03));border:1px solid rgba(201,168,76,.3)}
.plan-name{font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;font-weight:600}
.plan-price{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;color:var(--tx)}
.plan-period{font-size:13px;color:var(--m2);margin-left:6px}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:10px;margin:24px 0 28px}
.plan-features li{font-size:14px;color:var(--tx);display:flex;align-items:center;gap:8px}
.plan-features li::before{content:'✓';color:var(--g);font-size:16px}
/* Preview */
.preview-wrap{max-width:790px;margin:24px auto;padding:0 18px 40px}
.preview-actions{display:flex;gap:10px;margin-bottom:20px}
.invoice-doc{background:#f8f5ef;border-radius:5px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.65)}
.inv-hdr{background:#17120c;padding:40px 48px;display:flex;justify-content:space-between}
.inv-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#f8f5ef}
.inv-lbl{font-size:9px;letter-spacing:4px;color:#c9a84c;text-transform:uppercase;margin-bottom:8px}
.inv-due{font-family:'Playfair Display',serif;font-size:16px;color:#c9a84c;font-weight:600}
.inv-body{padding:40px 48px;color:#1c1810;font-family:'DM Sans',sans-serif}
.parties{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:36px}
.party-lbl{font-size:9px;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;margin-bottom:8px}
.party-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:#1c1810;margin-bottom:4px}
.party-info{font-size:12px;color:#787068;line-height:1.8;white-space:pre-line}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.inv-table thead tr{border-bottom:2px solid #1c1810}
.inv-table th{padding:8px 8px 10px;font-size:9px;letter-spacing:2px;color:#a09890;text-transform:uppercase;font-weight:500}
.inv-table th:first-child{text-align:left}.inv-table th:not(:first-child){text-align:right}
.inv-table td{padding:12px 8px;font-size:13px;border-bottom:1px solid #ede8de}
.inv-table td:not(:first-child){text-align:right;color:#78706a}
.inv-table td.bold{font-weight:600;color:#1c1810}
.totals-section{display:flex;justify-content:flex-end;margin-bottom:20px}
.totals-box{min-width:260px}
.total-line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #ede8de;font-size:13px;color:#989088}
.grand-line{display:flex;justify-content:space-between;padding:13px 0 0;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;border-top:2px solid #1c1810}
.grand-line span:last-child{color:#c9a84c}
.qr-box{border:1px solid #e0d8cc;border-radius:7px;padding:20px;display:flex;gap:20px;align-items:center;background:#f2ede4;margin-top:28px}
.qr-title{font-size:9px;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.qr-info{font-size:12px;color:#686058;line-height:2}
.qr-notes{font-size:11px;color:#989088;line-height:1.8;padding-left:20px;white-space:pre-line;border-left:1px solid #ddd8ce;margin-left:4px}
.inv-footer{padding:16px 48px;background:#ece7de;text-align:center;font-size:9px;letter-spacing:3px;color:#b8b0a4;text-transform:uppercase}
@media print{
  .no-print{display:none!important}
  body{background:white}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const SUPABASE_URL = 'https://gvlmipsqwaiymjtzeejw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_WPpOH1UEWHoBpzRs9vpkQA_gkAEqhVq';
const STRIPE_KEY = 'pk_live_51T91lw0xm0OVOFMgQUQOYbvXcalJkou9WbeVbdoF0eMNgbtcFgAi6bzPCibP7Dxqw3A21SjHt4yaPeDK3tX0xrgA00KhCuFL0Q';
const STRIPE_PRICE = 'price_1TEwyz0xm0OVOFMgKTNqUePs';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let state = {
  page: 'loading', // loading | auth | dashboard | editor | pricing | preview
  session: null,
  invoices: [],
  currentInvoice: null,
  form: null,
  authMode: 'login',
  msg: '',
  saving: false
};

function newInvoice() {
  return {
    number: 'FAC-' + Date.now().toString().slice(-4),
    date: new Date().toISOString().split('T')[0],
    due_date: new Date(Date.now()+30*864e5).toISOString().split('T')[0],
    client_name:'', client_address:'', client_city:'', client_vat:'',
    vat_rate: 8.1, notes:'Paiement par virement bancaire.\nIBAN: CH00 0000 0000 0000 0000 0',
    items:[{desc:'',qty:1,price:0}], status:'pending'
  };
}

function calcTotals(form) {
  const sub = form.items.reduce((s,x)=>s+Number(x.qty)*Number(x.price),0);
  const vt = sub*form.vat_rate/100;
  return { sub, vt, tot: sub+vt };
}

function fmtDate(d) {
  try { return new Date(d+'T12:00:00').toLocaleDateString('fr-CH',{day:'2-digit',month:'long',year:'numeric'}); }
  catch(e) { return d; }
}

function render() {
  const app = document.getElementById('app');
  switch(state.page) {
    case 'loading': app.innerHTML = renderLoading(); break;
    case 'auth': app.innerHTML = renderAuth(); break;
    case 'dashboard': app.innerHTML = renderDashboard(); break;
    case 'editor': app.innerHTML = renderEditor(); break;
    case 'preview': app.innerHTML = renderPreview(); break;
    case 'pricing': app.innerHTML = renderPricing(); break;
  }
  bindEvents();
}

function renderLoading() {
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
    <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--g)">FacturaPro...</div>
  </div>`;
}

function renderAuth() {
  return `<div class="auth-wrap">
    <div class="auth-box">
      <span class="label-tag">Facturation Suisse</span>
      <h1>FacturaPro</h1>
      <p class="sub">${state.authMode==='login'?'Connecte-toi à ton compte':'Crée ton compte gratuit'}</p>
      ${state.msg?`<div class="msg">${state.msg}</div>`:''}
      <input class="inp" id="email" type="email" placeholder="Email" autocomplete="email"/>
      <input class="inp" id="password" type="password" placeholder="Mot de passe" autocomplete="${state.authMode==='login'?'current-password':'new-password'}"/>
      <button class="btn-gold" id="authBtn">${state.authMode==='login'?'Se connecter':'Créer mon compte'}</button>
      <button class="btn-ghost" id="toggleAuth">${state.authMode==='login'?"Pas de compte ? Inscris-toi":"Déjà un compte ? Connecte-toi"}</button>
    </div>
  </div>`;
}

function renderDashboard() {
  const invCards = state.invoices.map(inv => `
    <div class="inv-card">
      <div>
        <div class="inv-client">${inv.client_name||'Client sans nom'}</div>
        <div class="inv-meta">Facture ${inv.number} · ${new Date(inv.date+'T12:00:00').toLocaleDateString('fr-CH')}</div>
      </div>
      <div class="inv-right">
        <span class="inv-amount">${Number(inv.total||0).toFixed(2)} CHF</span>
        <span class="badge ${inv.status==='paid'?'badge-paid':'badge-pending'}">${inv.status==='paid'?'Payée':'En attente'}</span>
        <button class="btn-edit" data-edit="${inv.id}">Éditer</button>
        <button class="btn-del" data-del="${inv.id}">Supprimer</button>
      </div>
    </div>`).join('');

  return `
    <nav class="nav">
      <div class="nav-logo">Factura<span>Pro</span></div>
      <div class="nav-actions">
        <button class="btn-sm btn-outline" id="gopricing">Plans</button>
        <button class="btn-gold-sm" id="newInv">+ Nouvelle facture</button>
        <button class="btn-sm btn-outline" id="logout">Déconnexion</button>
      </div>
    </nav>
    <div class="dash">
      <div class="dash-header">
        <div class="eyebrow">Tableau de bord</div>
        <h1>Mes factures</h1>
      </div>
      ${state.invoices.length===0?`
        <div class="empty">
          <div class="icon">📄</div>
          <p>Aucune facture pour l'instant</p>
          <button class="btn-gold" style="width:auto;padding:12px 28px" id="newInv2">Créer ma première facture</button>
        </div>
      `:`<div class="inv-list">${invCards}</div>`}
    </div>`;
}

function renderEditor() {
  const f = state.form;
  const {sub,vt,tot} = calcTotals(f);
  const itemRows = f.items.map((x,i)=>`
    <div class="item-row">
      <input class="inp" style="margin:0" data-item="${i}" data-field="desc" value="${x.desc||''}" placeholder="Description..."/>
      <input class="inp" style="margin:0;text-align:center" type="number" data-item="${i}" data-field="qty" value="${x.qty}" min="1"/>
      <input class="inp" style="margin:0;text-align:right" type="number" data-item="${i}" data-field="price" value="${x.price}" min="0" step="0.01"/>
      <div class="item-total">${(Number(x.qty)*Number(x.price)).toFixed(2)}</div>
      <button class="btn-remove" data-remove="${i}">×</button>
    </div>`).join('');

  return `
    <nav class="nav no-print">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-sm btn-outline" id="backDash">← Retour</button>
        <span style="color:rgba(255,255,255,.2)">|</span>
        <span style="font-size:13px;color:var(--tx);font-family:'Playfair Display',serif">Facture #${f.number}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button id="tabEdit" style="padding:6px 14px;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase;background:${state.editorTab!=='preview'?'#c9a84c':'transparent'};color:${state.editorTab!=='preview'?'#0b0b0c':'#888480'}">Éditer</button>
        <button id="tabPreview" style="padding:6px 14px;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase;background:${state.editorTab==='preview'?'#c9a84c':'transparent'};color:${state.editorTab==='preview'?'#0b0b0c':'#888480'}">Aperçu</button>
      </div>
    </nav>
    ${state.editorTab==='preview'?renderInvoiceDoc(f,sub,vt,tot,true):`
    <div class="editor">
      <div class="card">
        <div class="card-title">Informations</div>
        <div class="g3">
          <div class="field"><label>Numéro</label><input id="f_number" value="${f.number}"/></div>
          <div class="field"><label>Date</label><input type="date" id="f_date" value="${f.date}"/></div>
          <div class="field"><label>Échéance</label><input type="date" id="f_due_date" value="${f.due_date}"/></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Client</div>
        <div class="g2">
          <div class="field"><label>Nom</label><input id="f_client_name" value="${f.client_name||''}" placeholder="Nom du client"/></div>
          <div class="field"><label>Adresse</label><input id="f_client_address" value="${f.client_address||''}" placeholder="Rue et numéro"/></div>
          <div class="field"><label>Ville NPA</label><input id="f_client_city" value="${f.client_city||''}" placeholder="1000 Lausanne"/></div>
          <div class="field"><label>N° TVA</label><input id="f_client_vat" value="${f.client_vat||''}" placeholder="CHE-xxx.xxx.xxx"/></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Prestations</div>
        <div class="items-header"><span>Description</span><span>Qté</span><span>Prix unit.</span><span>Total CHF</span><span></span></div>
        ${itemRows}
        <button class="btn-add-item" id="addItem">+ Ajouter une ligne</button>
        <div class="totals">
          <div class="total-row"><span>Sous-total HT</span><span>${sub.toFixed(2)} CHF</span></div>
          <div class="total-row">
            <span>TVA</span>

              ${[0,2.6,3.8,8.1].map(r=>`<option value="${r}" ${Number(f.vat_rate)===r?'selected':''}>${r}%</option>`).join('')}
            </select>
            <span>${vt.toFixed(2)} CHF</span>
          </div>
          <div class="grand"><span class="grand-label">Total TTC</span><span class="grand-amount">${tot.toFixed(2)} CHF</span></div>
        </div>

      <div class="card">
        <div class="card-title">Notes & IBAN</div>
        <div class="field"><textarea id="f_notes" rows="3" style="width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;resize:vertical;outline:none;line-height:1.65">${f.notes||''}</textarea></div>
      </div>
      <div class="actions no-print">
        <button class="btn-cancel" id="backDash2">Annuler</button>
        <button class="btn-save" id="saveInv">${state.saving?'Sauvegarde...':'Sauvegarder la facture'}</button>
      </div>
    </div>`}`;
}

function renderInvoiceDoc(f,sub,vt,tot,withActions=false) {
  const rows = f.items.filter(x=>x.desc).map(x=>`
    <tr>
      <td>${x.desc}</td>
      <td>${x.qty}</td>
      <td>${Number(x.price).toFixed(2)}</td>
      <td class="bold">${(Number(x.qty)*Number(x.price)).toFixed(2)}</td>
    </tr>`).join('');

  const qrSvg = generateQR(80);

  return `
    ${withActions?`<div class="preview-wrap">
      <div class="preview-actions no-print">
        <button class="btn-sm btn-outline" id="backDash">← Retour</button>
        <button class="btn-sm btn-outline" id="saveInvPreview">${state.saving?'...':'Sauvegarder'}</button>
        <button class="btn-gold-sm" onclick="window.print()">Imprimer / PDF</button>
      </div>`:''}
    <div class="invoice-doc">
      <div class="inv-hdr">
        <div>
          <div class="inv-lbl">Facture</div>
          <div class="inv-num">#${f.number}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:9px;letter-spacing:3px;color:#5a5248;text-transform:uppercase;margin-bottom:3px">Émission</div>
          <div style="font-size:13px;color:#f8f5ef;margin-bottom:11px">${fmtDate(f.date)}</div>
          <div style="font-size:9px;letter-spacing:3px;color:#5a5248;text-transform:uppercase;margin-bottom:3px">Échéance</div>
          <div class="inv-due">${fmtDate(f.due_date)}</div>
        </div>
      </div>
      <div class="inv-body">
        <div class="parties">
          <div>
            <div class="party-lbl">Client</div>
            <div class="party-name">${f.client_name||'—'}</div>
            <div class="party-info">${[f.client_address,f.client_city,f.client_vat?'TVA: '+f.client_vat:''].filter(Boolean).join('\n')}</div>
          </div>
        </div>
        <table class="inv-table">
          <thead><tr><th style="text-align:left">Description</th><th>Qté</th><th>Prix unit.</th><th>Total CHF</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="totals-section">
          <div class="totals-box">
            <div class="total-line"><span>Sous-total HT</span><span>${sub.toFixed(2)} CHF</span></div>
            <div class="total-line"><span>TVA ${f.vat_rate}%</span><span>${vt.toFixed(2)} CHF</span></div>
            <div class="grand-line"><span>Total TTC</span><span>${tot.toFixed(2)} CHF</span></div>
          </div>
        </div>
        <div class="qr-box">
          ${qrSvg}
          <div>
            <div class="qr-title">QR-Facture Swiss Payment</div>
            <div class="qr-info"><strong>Montant:</strong> ${tot.toFixed(2)} CHF<br/><strong>Référence:</strong> ${f.number}</div>
          </div>
          <div class="qr-notes">${(f.notes||'').replace(/\n/g,'<br/>')}</div>
        </div>
      </div>
      <div class="inv-footer">FacturaPro — Facturation Suisse</div>
    </div>
    ${withActions?'</div>':''}`;
}

function generateQR(size) {
  const n=21,c=size/n;
  let rects='';
  for(let r=0;r<n;r++) for(let col=0;col<n;col++) {
    let v=0;
    if((r<7&&col<7)||(r<7&&col>=n-7)||(r>=n-7&&col<7)) v=1;
    else if(!(r===7||col===7)) {
      if(r>=8&&r<=12&&col>=8&&col<=12) v=(r+col)%2===0?1:0;
      else v=Math.abs(Math.sin(r*13+col*7))>0.42?1:0;
    }
    if(v) rects+=`<rect x="${col*c}" y="${r*c}" width="${c}" height="${c}" fill="#18130d"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" fill="white"/>${rects}</svg>`;
}

        <p style="font-size:15px;color:var(--m2)">Commence gratuitement. Passe à Solo quand tu es prêt.</p>

function bindEvents() {
  const on = (id, ev, fn) => { const el = document.getElementById(id); if(el) el.addEventListener(ev, fn); };

  if(state.page==='auth') {
    on('authBtn','click', async()=>{
      const email = document.getElementById('email')?.value;
      const password = document.getElementById('password')?.value;
      if(!email||!password) { state.msg='Remplis tous les champs.'; render(); return; }
      state.msg='';
      const {error} = state.authMode==='login'
        ? await sb.auth.signInWithPassword({email,password})
        : await sb.auth.signUp({email,password});
      if(error) { state.msg=error.message; render(); }
      else if(state.authMode==='signup') { state.msg='Vérifie ton email pour confirmer ton compte.'; render(); }
    });
    on('toggleAuth','click',()=>{ state.authMode=state.authMode==='login'?'signup':'login'; state.msg=''; render(); });
  }

  if(state.page==='dashboard') {
    on('newInv','click',()=>{ state.form=newInvoice(); state.editorTab='edit'; state.currentInvoice=null; state.page='editor'; render(); });
    on('newInv2','click',()=>{ state.form=newInvoice(); state.editorTab='edit'; state.currentInvoice=null; state.page='editor'; render(); });
    on('logout','click',()=>sb.auth.signOut());
    on('gopricing','click',()=>{ state.page='pricing'; render(); });
    document.querySelectorAll('[data-edit]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const inv = state.invoices.find(i=>i.id===btn.dataset.edit);
        if(inv){ state.form={...inv,items:inv.items||[{desc:'',qty:1,price:0}]}; state.editorTab='edit'; state.currentInvoice=inv; state.page='editor'; render(); }
      });
    });
    document.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click',async()=>{
        if(!confirm('Supprimer cette facture ?')) return;
        await sb.from('invoices').delete().eq('id',btn.dataset.del);
        state.invoices = state.invoices.filter(i=>i.id!==btn.dataset.del);
        render();
      });
    });
  }

  if(state.page==='editor') {
    on('backDash','click',()=>{ state.page='dashboard'; render(); });
    on('backDash2','click',()=>{ state.page='dashboard'; render(); });
    on('tabEdit','click',()=>{ syncForm(); state.editorTab='edit'; render(); });
    on('tabPreview','click',()=>{ syncForm(); state.editorTab='preview'; render(); });
    on('addItem','click',()=>{ syncForm(); state.form.items.push({desc:'',qty:1,price:0}); render(); });
    on('saveInv','click',()=>saveInvoice());
    on('saveInvPreview','click',()=>saveInvoice());
    document.querySelectorAll('[data-remove]').forEach(btn=>{
      btn.addEventListener('click',()=>{ syncForm(); state.form.items.splice(Number(btn.dataset.remove),1); if(!state.form.items.length) state.form.items.push({desc:'',qty:1,price:0}); render(); });
    });
    document.querySelectorAll('[data-item]').forEach(inp=>{
      inp.addEventListener('input',()=>{ const i=Number(inp.dataset.item),f=inp.dataset.field; state.form.items[i][f]=inp.value; const row=document.querySelectorAll('.item-total')[i]; if(row) row.textContent=(Number(state.form.items[i].qty)*Number(state.form.items[i].price)).toFixed(2); });
    });
    ['f_number','f_date','f_due_date','f_client_name','f_client_address','f_client_city','f_client_vat','f_notes','f_vat_rate'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.addEventListener('input',()=>{ const key=id.replace('f_',''); state.form[key]=el.value; });
    });
  }

  if(state.page==='pricing') {
    on('backFromPricing','click',()=>{ state.page='dashboard'; render(); });
    on('gotofree','click',()=>{ state.page='dashboard'; render(); });
    on('gotostripe','click',async()=>{
      const stripe = Stripe(STRIPE_KEY);
      await stripe.redirectToCheckout({
        lineItems:[{price:STRIPE_PRICE,quantity:1}],
        mode:'subscription',
        successUrl: window.location.origin+'/?success=true',
        cancelUrl: window.location.origin+'/?pricing=true',
        customerEmail: state.session?.user?.email
      });
    });
  }
}

function syncForm() {
  if(state.editorTab==='preview') return;
  ['number','date','due_date','client_name','client_address','client_city','client_vat','notes'].forEach(k=>{
    const el=document.getElementById('f_'+k); if(el) state.form[k]=el.value;
  });
  const vat=document.getElementById('f_vat_rate'); if(vat) state.form.vat_rate=Number(vat.value);
}

async function saveInvoice() {
  if(state.saving) return;
  syncForm();
  state.saving=true; render();
  const {sub,vt,tot}=calcTotals(state.form);
  const data={...state.form,subtotal:sub,vat_amount:vt,total:tot,user_id:state.session.user.id};
  if(state.currentInvoice?.id) {
    await sb.from('invoices').update(data).eq('id',state.currentInvoice.id);
  } else {
    await sb.from('invoices').insert([data]);
  }
  state.saving=false;
  const {data:invs}=await sb.from('invoices').select('*').order('created_at',{ascending:false});
  state.invoices=invs||[];
  state.page='dashboard'; render();
}

async function loadInvoices() {
  const {data}=await sb.from('invoices').select('*').order('created_at',{ascending:false});
  state.invoices=data||[];
}

// Init
(async()=>{
  const params=new URLSearchParams(window.location.search);
  if(params.get('success')==='true') { alert('Paiement confirmé ! Bienvenue sur FacturaPro Solo.'); window.history.replaceState({},'','/'); }

  const {data:{session}}=await sb.auth.getSession();
  state.session=session;
  if(session) {
    await loadInvoices();
    state.page = params.get('pricing')==='true'?'pricing':'dashboard';
  } else {
    state.page='auth';
  }
  render();

  sb.auth.onAuthStateChange(async(_,session)=>{
    state.session=session;
    if(session) { await loadInvoices(); state.page='dashboard'; }
    else { state.page='auth'; }
    render();
  });
})();
</script>
